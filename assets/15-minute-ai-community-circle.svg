    <!-- Education+: top-right, bright green -->
    <radialGradient id="a-edu" cx="64%" cy="26%" r="52%">
      <stop offset="0%" stop-color="#90d840" stop-opacity=".72"/>
      <stop offset="100%" stop-color="#90d840" stop-opacity="0"/>
    </radialGradient>
    <!-- Work+: right, blue -->
    <radialGradient id="a-work" cx="80%" cy="46%" r="50%">
