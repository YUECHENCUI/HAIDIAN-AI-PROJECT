<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 372" width="480" height="372" class="sf-map">
<style><![CDATA[

svg { --gold:#F5C842; --gold2:#FFD966; --teal:#7DC0BD; --body:#BEC9D2; --white:#EDF1F4; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif; background:#091520; }
.sf-water-lbl { font-size:8px; fill:#5e8e98; letter-spacing:.08em; }
.sf-zone { stroke-width:1; }
.sf-zone--work { fill:rgba(245,200,66,0.10); stroke:rgba(245,200,66,0.45); }
.sf-zone--social { fill:rgba(144,112,224,0.14); stroke:rgba(144,112,224,0.5); }
.sf-nbhd { font-size:8px; fill:var(--body); text-anchor:middle; }
.sf-nbhd--key { fill:var(--gold2); font-weight:600; font-size:9px; }
.sf-nbhd--social { fill:#b9a6ee; font-weight:600; }
.sf-nbhd--faint { fill:#5a6470; }
.sf-dots circle { fill:var(--teal); opacity:.85; }
.sf-anchor { fill:#e85a96; stroke:#fff; stroke-width:1.5; }
.sf-anchor--o { fill:var(--gold); }
.sf-anchor-lbl { font-size:7.5px; fill:var(--white); text-anchor:middle; }
.sf-southbay rect { fill:rgba(255,255,255,0.03); stroke:rgba(122,134,150,0.4); stroke-width:1; }
.sf-sb-title { font-size:9px; fill:#8a96a4; font-weight:600; }
.sf-sb-sub { font-size:7px; fill:#66707c; letter-spacing:.06em; }
.sf-sb-chip { font-size:7.5px; fill:#7e8a98; }
.sf-shift-lbl { font-size:8px; fill:var(--gold); font-style:italic; font-family:"Cormorant Garamond",serif; }

]]></style>
          <defs>
            <radialGradient id="bayG" cx="78%" cy="40%" r="80%">
              <stop offset="0%" stop-color="#16404a" stop-opacity=".55"/>
              <stop offset="100%" stop-color="#0a1c28" stop-opacity=".15"/>
            </radialGradient>
          </defs>
          <!-- bay backdrop -->
          <rect x="0" y="0" width="480" height="372" fill="url(#bayG)"/>
          <path d="M300 30 q40 60 30 130 q-12 80 18 150 M340 60 q34 70 20 150" fill="none" stroke="#2e6470" stroke-width="1" stroke-opacity=".4" stroke-dasharray="3 6"/>
          <!-- land -->
          <path d="M52 44 L236 58 Q262 96 258 150 Q250 250 232 300 Q200 344 150 340 Q86 332 64 300 Q40 240 44 150 Q44 92 52 44 Z"
                fill="#0e2330" stroke="rgba(125,192,189,0.35)" stroke-width="1.2"/>
          <text x="150" y="36" text-anchor="middle" class="sf-water-lbl">San Francisco Bay · 旧金山湾</text>

          <!-- work cluster zones -->
          <ellipse class="sf-zone sf-zone--work" cx="168" cy="172" rx="40" ry="30"/>
          <ellipse class="sf-zone sf-zone--work" cx="232" cy="236" rx="36" ry="28"/>
          <!-- social zone -->
          <ellipse class="sf-zone sf-zone--social" cx="92" cy="158" rx="30" ry="22"/>

          <!-- neighborhood labels -->
          <text x="206" y="80"  class="sf-nbhd">金融区</text>
          <text x="190" y="126" class="sf-nbhd">Yerba Buena</text>
          <text x="168" y="176" class="sf-nbhd sf-nbhd--key">SoMa</text>
          <text x="244" y="150" class="sf-nbhd">South Beach</text>
          <text x="232" y="240" class="sf-nbhd sf-nbhd--key">Mission Bay</text>
          <text x="226" y="300" class="sf-nbhd">Dogpatch</text>
          <text x="172" y="284" class="sf-nbhd">Potrero Hill</text>
          <text x="108" y="232" class="sf-nbhd">Mission</text>
          <text x="92"  y="160" class="sf-nbhd sf-nbhd--social">Hayes Valley</text>
          <text x="70"  y="64"  class="sf-nbhd sf-nbhd--faint">Presidio</text>

          <!-- company dots: SoMa cluster -->
          <g class="sf-dots">
            <circle cx="150" cy="160" r="3"/><circle cx="160" cy="168" r="3"/><circle cx="172" cy="160" r="3"/>
            <circle cx="182" cy="170" r="3"/><circle cx="156" cy="180" r="3"/><circle cx="170" cy="184" r="3"/>
            <circle cx="184" cy="158" r="3"/><circle cx="146" cy="172" r="3"/>
            <!-- Mission Bay cluster -->
            <circle cx="220" cy="226" r="3"/><circle cx="234" cy="230" r="3"/><circle cx="246" cy="238" r="3"/>
            <circle cx="226" cy="244" r="3"/><circle cx="240" cy="248" r="3"/><circle cx="216" cy="240" r="3"/>
            <!-- scattered -->
            <circle cx="248" cy="150" r="3"/><circle cx="206" cy="86" r="3"/><circle cx="112" cy="222" r="3"/>
            <circle cx="124" cy="234" r="3"/><circle cx="222" cy="296" r="3"/>
          </g>
          <!-- anchor companies -->
          <circle class="sf-anchor" cx="166" cy="172" r="6"/>
          <text x="166" y="200" text-anchor="middle" class="sf-anchor-lbl">Anthropic · 500 Howard</text>
          <circle class="sf-anchor sf-anchor--o" cx="232" cy="236" r="6"/>
          <text x="232" y="264" text-anchor="middle" class="sf-anchor-lbl">OpenAI · Mission Bay</text>

          <!-- South Bay inset -->
          <g class="sf-southbay">
            <rect x="300" y="278" width="166" height="78" rx="8"/>
            <text x="312" y="298" class="sf-sb-title">南湾 South Bay</text>
            <text x="312" y="312" class="sf-sb-sub">成熟大厂据点 · Legacy giants</text>
            <text x="312" y="330" class="sf-sb-chip">Google 山景城 · Meta 门洛帕克</text>
            <text x="312" y="345" class="sf-sb-chip">NVIDIA 圣克拉拉 · SSI 帕洛阿尔托</text>
          </g>
          <!-- shift arrow -->
          <path d="M356 276 Q300 230 256 218" fill="none" stroke="var(--gold)" stroke-width="1.6" stroke-dasharray="4 4" marker-end="url(#ah)"/>
          <defs><marker id="ah" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 Z" fill="var(--gold)"/></marker></defs>
          <text x="300" y="250" class="sf-shift-lbl">重心北移</text>
        </svg>
